# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
types:
  EvaluatorType:
    docs: |
      The evaluator engine type.

      The unstable public API currently supports only LLM-as-a-judge evaluators.
    enum:
      - llm_as_judge

  EvaluatorScope:
    docs: |
      Where an evaluator comes from.

      - `project`: created in your project
      - `managed`: provided by Langfuse
    enum:
      - project
      - managed

  ContinuousEvaluationTarget:
    docs: |
      The ingestion object type that should trigger evaluation runs.

      - `observation` evaluates live-ingested observations such as generations, spans, and events.
      - `experiment` evaluates live experiment executions and can additionally map `expected_output`.
    enum:
      - observation
      - experiment

  ContinuousEvaluationStatus:
    docs: |
      Effective runtime status of the continuous evaluation.

      - `active`: enabled and currently runnable.
      - `inactive`: disabled by configuration.
      - `paused`: enabled, but Langfuse has blocked execution until the underlying issue is resolved.
    enum:
      - active
      - inactive
      - paused

  ContinuousEvaluationMappingSource:
    docs: |
      Source field used to populate a prompt variable.

      Use these values when mapping evaluator prompt variables to live data:
      - `input`: the observation or experiment input
      - `output`: the observation or experiment output
      - `metadata`: the observation metadata object
      - `expected_output`: the experiment item expected output. Only valid for `target=experiment`.
    enum:
      - input
      - output
      - metadata
      - expected_output

  EvaluatorModelConfig:
    docs: |
      Optional explicit model configuration for an evaluator.

      If omitted, Langfuse uses the project's default evaluation model.
      If provided, the model must be available to the project when the evaluator or continuous evaluation is enabled.

      To discover valid configured `provider` values for a project, call `GET /api/public/llm-connections` and read the `provider` field from the returned connections.
      Use a `provider` value that matches one of the connections already configured in the same project.
    properties:
      provider:
        type: string
        docs: |
          Provider identifier to use for this evaluator, for example `openai` or `anthropic`.

          To discover valid values for the current project, call `GET /api/public/llm-connections` and use one of the returned `provider` values.
      model:
        type: string
        docs: Model identifier exposed by the provider, for example `gpt-4.1-mini`.
    examples:
      - value:
          provider: openai
          model: gpt-4.1-mini

  EvaluatorOutputDataType:
    docs: Structured score type returned by an evaluator.
    enum:
      - NUMERIC
      - BOOLEAN
      - CATEGORICAL

  EvaluatorOutputFieldDefinition:
    properties:
      description:
        type: string
        docs: Human-readable instructions for what the evaluator should return in this field.

  LegacyEvaluatorOutputDefinition:
    docs: |
      Legacy evaluator output definition.

      This shape is supported for backward compatibility, but new clients should prefer the v2 output definition shapes below.
    properties:
      reasoning:
        type: string
        docs: Instructions for the reasoning field.
      score:
        type: string
        docs: Instructions for the score field.
    examples:
      - value:
          reasoning: Explain why the answer is correct or incorrect.
          score: Return a number between 0 and 1.

  NumericEvaluatorOutputDefinitionV2:
    properties:
      version:
        type: integer
        docs: Output definition version. Must be `2`.
      dataType:
        type: EvaluatorOutputDataType
        docs: Must be `NUMERIC`.
      reasoning:
        type: EvaluatorOutputFieldDefinition
      score:
        type: EvaluatorOutputFieldDefinition

  BooleanEvaluatorOutputDefinitionV2:
    properties:
      version:
        type: integer
        docs: Output definition version. Must be `2`.
      dataType:
        type: EvaluatorOutputDataType
        docs: Must be `BOOLEAN`.
      reasoning:
        type: EvaluatorOutputFieldDefinition
      score:
        type: EvaluatorOutputFieldDefinition

  CategoricalEvaluatorOutputScoreV2:
    properties:
      description:
        type: string
        docs: Human-readable instructions for how the evaluator should choose categories.
      categories:
        type: list<string>
        docs: Allowed category labels. Must contain at least two unique values.
      shouldAllowMultipleMatches:
        type: optional<boolean>
        docs: Whether the evaluator may return more than one matching category.

  CategoricalEvaluatorOutputDefinitionV2:
    properties:
      version:
        type: integer
        docs: Output definition version. Must be `2`.
      dataType:
        type: EvaluatorOutputDataType
        docs: Must be `CATEGORICAL`.
      reasoning:
        type: EvaluatorOutputFieldDefinition
      score:
        type: CategoricalEvaluatorOutputScoreV2

  EvaluatorOutputDefinitionV2:
    discriminant: dataType
    union:
      NUMERIC:
        type: NumericEvaluatorOutputDefinitionV2
      BOOLEAN:
        type: BooleanEvaluatorOutputDefinitionV2
      CATEGORICAL:
        type: CategoricalEvaluatorOutputDefinitionV2

  EvaluatorOutputDefinition:
    docs: |
      Structured output definition for an evaluator.

      New clients should prefer the version `2` shapes because they are explicit about the score data type and field descriptions.
    discriminated: false
    union:
      - LegacyEvaluatorOutputDefinition
      - EvaluatorOutputDefinitionV2
    examples:
      - name: NumericV2
        value:
          version: 2
          dataType: NUMERIC
          reasoning:
            description: Explain why the answer is correct or incorrect.
          score:
            description: Return a score between 0 and 1.
      - name: BooleanV2
        value:
          version: 2
          dataType: BOOLEAN
          reasoning:
            description: Explain why the output satisfies the requirement.
          score:
            description: Return true if the output satisfies the requirement, otherwise false.
      - name: CategoricalV2
        value:
          version: 2
          dataType: CATEGORICAL
          reasoning:
            description: Explain which category best fits the output.
          score:
            description: Choose the best category.
            categories:
              - correct
              - partially_correct
              - incorrect
            shouldAllowMultipleMatches: false

  PublicNumericEvaluatorOutputDefinition:
    properties:
      dataType:
        type: EvaluatorOutputDataType
        docs: Always `NUMERIC`.
      reasoning:
        type: EvaluatorOutputFieldDefinition
      score:
        type: EvaluatorOutputFieldDefinition

  PublicBooleanEvaluatorOutputDefinition:
    properties:
      dataType:
        type: EvaluatorOutputDataType
        docs: Always `BOOLEAN`.
      reasoning:
        type: EvaluatorOutputFieldDefinition
      score:
        type: EvaluatorOutputFieldDefinition

  PublicCategoricalEvaluatorOutputScoreDefinition:
    properties:
      description:
        type: string
      categories:
        type: list<string>
      shouldAllowMultipleMatches:
        type: boolean

  PublicCategoricalEvaluatorOutputDefinition:
    properties:
      dataType:
        type: EvaluatorOutputDataType
        docs: Always `CATEGORICAL`.
      reasoning:
        type: EvaluatorOutputFieldDefinition
      score:
        type: PublicCategoricalEvaluatorOutputScoreDefinition

  PublicEvaluatorOutputDefinition:
    docs: |
      Evaluator output definition returned by the public API.

      This response always includes `dataType` and never includes an internal output-definition `version`.
      Legacy stored evaluator definitions are normalized into this shape before they are returned.
    discriminant: dataType
    union:
      NUMERIC:
        type: PublicNumericEvaluatorOutputDefinition
      BOOLEAN:
        type: PublicBooleanEvaluatorOutputDefinition
      CATEGORICAL:
        type: PublicCategoricalEvaluatorOutputDefinition

  ContinuousEvaluationStringFilterOperator:
    enum:
      - name: Equals
        value: "="
      - name: Contains
        value: contains
      - name: DoesNotContain
        value: does not contain
      - name: StartsWith
        value: starts with
      - name: EndsWith
        value: ends with

  ContinuousEvaluationNumberFilterOperator:
    enum:
      - name: Equals
        value: "="
      - name: GreaterThan
        value: ">"
      - name: LessThan
        value: "<"
      - name: GreaterThanOrEqual
        value: ">="
      - name: LessThanOrEqual
        value: "<="

  ContinuousEvaluationOptionsFilterOperator:
    enum:
      - name: AnyOf
        value: any of
      - name: NoneOf
        value: none of

  ContinuousEvaluationArrayOptionsFilterOperator:
    enum:
      - name: AnyOf
        value: any of
      - name: NoneOf
        value: none of
      - name: AllOf
        value: all of

  ContinuousEvaluationBooleanFilterOperator:
    enum:
      - name: Equals
        value: "="
      - name: NotEquals
        value: "<>"

  ContinuousEvaluationNullFilterOperator:
    enum:
      - name: IsNull
        value: is null
      - name: IsNotNull
        value: is not null

  DateTimeContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Column to filter on.
      operator:
        type: ContinuousEvaluationNumberFilterOperator
        docs: Comparison operator for datetime values.
      value:
        type: datetime
        docs: Datetime value to compare against.

  StringContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Column to filter on.
      operator:
        type: ContinuousEvaluationStringFilterOperator
      value:
        type: string

  NumberContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Column to filter on.
      operator:
        type: ContinuousEvaluationNumberFilterOperator
      value:
        type: double

  StringOptionsContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Column to filter on.
      operator:
        type: ContinuousEvaluationOptionsFilterOperator
      value:
        type: list<string>
        docs: One or more allowed string values.

  ArrayOptionsContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Column to filter on.
      operator:
        type: ContinuousEvaluationArrayOptionsFilterOperator
      value:
        type: list<string>
        docs: One or more array elements to match.

  StringObjectContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Object-valued column to filter on, for example `metadata`.
      key:
        type: string
        docs: Key inside the object-valued column to filter on.
      operator:
        type: ContinuousEvaluationStringFilterOperator
      value:
        type: string

  NumberObjectContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Object-valued column to filter on.
      key:
        type: string
        docs: Key inside the object-valued column to filter on.
      operator:
        type: ContinuousEvaluationNumberFilterOperator
      value:
        type: double

  CategoryOptionsContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Object-valued column to filter on.
      key:
        type: string
        docs: Key inside the object-valued column to filter on.
      operator:
        type: ContinuousEvaluationOptionsFilterOperator
      value:
        type: list<string>

  BooleanContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Column to filter on.
      operator:
        type: ContinuousEvaluationBooleanFilterOperator
      value:
        type: boolean

  NullContinuousEvaluationFilter:
    properties:
      column:
        type: string
        docs: Column to filter on.
      operator:
        type: ContinuousEvaluationNullFilterOperator
      value:
        type: optional<string>
        docs: Ignored placeholder value. Clients may omit it or send an empty string.

  ContinuousEvaluationMapping:
    docs: |
      Maps one evaluator prompt variable to one source field from the target object.

      Every variable extracted from the evaluator prompt must be mapped exactly once.
      Use `jsonPath` only when the source field is a JSON object and you want to extract a nested value.
    properties:
      variable:
        type: string
        docs: |
          Prompt variable name without braces.

          Example: for the prompt `Judge {{input}} against {{output}}`, use `input` and `output`.
      source:
        type: ContinuousEvaluationMappingSource
        docs: Source field that should populate the prompt variable.
      jsonPath:
        type: optional<string>
        docs: |
          Optional JSONPath selector applied to the selected source before it is passed to the evaluator prompt.

          Requirements:
          - Must start with `$`
          - Must be a syntactically valid JSONPath expression
          - Most useful with `source=metadata`
    examples:
      - name: BasicObservationMapping
        value:
          variable: input
          source: input
      - name: MetadataProjectionMapping
        value:
          variable: customer_tier
          source: metadata
          jsonPath: "$.customer.tier"

  ContinuousEvaluationFilter:
    docs: |
      Filter condition used to decide whether a live-ingested target should be evaluated.

      Each filter object follows the same typed filter schema used elsewhere in the Langfuse API.
      The exact `column`, `operator`, `key`, and `value` fields depend on the selected filter `type`.

      Common examples:
      - Observation type filter:
        `{ "type": "stringOptions", "column": "type", "operator": "any of", "value": ["GENERATION"] }`
      - Observation level filter:
        `{ "type": "stringOptions", "column": "level", "operator": "any of", "value": ["ERROR"] }`
      - Experiment dataset filter:
        `{ "type": "stringOptions", "column": "datasetId", "operator": "any of", "value": ["dataset-prod"] }`

      Target-specific notes:
      - `observation` supports columns such as `type`, `name`, `environment`, `level`, `version`, `traceName`, `userId`, `sessionId`, `tags`, `metadata`, and `parentObservationId`.
      - `experiment` currently supports `datasetId`.
    discriminant: type
    union:
      "datetime":
        type: DateTimeContinuousEvaluationFilter
      "string":
        type: StringContinuousEvaluationFilter
      "number":
        type: NumberContinuousEvaluationFilter
      "stringOptions":
        type: StringOptionsContinuousEvaluationFilter
      "categoryOptions":
        type: CategoryOptionsContinuousEvaluationFilter
      "arrayOptions":
        type: ArrayOptionsContinuousEvaluationFilter
      "stringObject":
        type: StringObjectContinuousEvaluationFilter
      "numberObject":
        type: NumberObjectContinuousEvaluationFilter
      "boolean":
        type: BooleanContinuousEvaluationFilter
      "null":
        type: NullContinuousEvaluationFilter
    examples:
      - name: ObservationTypeFilter
        value:
          type: stringOptions
          column: type
          operator: any of
          value:
            - GENERATION
      - name: ExperimentDatasetFilter
        value:
          type: stringOptions
          column: datasetId
          operator: any of
          value:
            - dataset-prod
